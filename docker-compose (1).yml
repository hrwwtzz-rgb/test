version: '3.8'

volumes:
  n8n_storage:
  db_storage:

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - db_storage:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -h localhost -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10

  n8n:
    build:
      context: .
      dockerfile: Dockerfile.n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      - DB_TYPE=postgresdb
      # ✅ ИСПРАВЛЕНИЕ 1: опечатка HSOT → HOST
      # Оригинал: DB_POSTGRESDB_HSOT=postgres
      # n8n не мог подключиться к БД — переменная просто игнорировалась,
      # хост оставался пустым/дефолтным (localhost), что внутри Docker-сети не работает.
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
      - DB_POSTGRESDB_USER=${POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - WEBHOOK_URL=${WEBHOOK_URL}
      - GENERIC_TIMEZONE=Europe/Moscow
      - NODE_FUNCTION_ALLOW_EXTERNAL=*
      # ✅ ИСПРАВЛЕНИЕ 3: добавлена базовая аутентификация
      # Оригинал: блок отсутствовал полностью
      # Без Basic Auth n8n открыт для любого, кто знает адрес — критическая уязвимость.
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
    volumes:
      # ✅ ИСПРАВЛЕНИЕ 2: примонтирован именованный том n8n_storage
      # Оригинал: только ./downloads:/home/node/downloads
      # Без монтирования /home/node/.n8n все воркфлоу, credentials и настройки
      # терялись при каждом docker-compose down / перезапуске контейнера.
      - n8n_storage:/home/node/.n8n
      - ./downloads:/home/node/downloads
    depends_on:
      postgres:
        condition: service_healthy
